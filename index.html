<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>Compresso</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="styles.css" />

    <script src="script.js"></script>
  </head>

  <body>
    <div class="container">
      <h1>Compresso</h1>

      <p class="subtitle">Effortless File Compression using Huffman Encoding</p>

      <div class="card">
        <div class="step">STEP 1</div>

        <h2>Import your document</h2>

        <img src="assets/text_file_icon1.png" class="icon" />

        <form class="upload-section">
          <input type="file" id="uploadfile" />

          <input type="button" id="submitbtn" value="Import" />
        </form>

        <p class="note">Supports .txt files only</p>
      </div>

      <div class="card">
        <div class="step">STEP 2</div>

        <h2>Choose Operation</h2>

        <img src="assets/options_icon2.png" class="icon" />

        <div class="buttons">
          <button id="encode">Compress</button>

          <button id="decode">Decompress</button>
        </div>
      </div>

      <div class="card">
        <div class="step">STEP 3</div>

        <h2>Download your processed file</h2>

        <img src="assets/wait_icon1.png" class="icon" />
      </div>

      <div class="restart">
        <button onclick="location.reload()">Start Over</button>
      </div>

      <div class="footer">
        Learn more about Huffman Compression

        <a href="info.html" target="_blank"> Read More </a>
      </div>
    </div>
  </body>
</html>
